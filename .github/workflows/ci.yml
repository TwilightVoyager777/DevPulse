name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend — Gradle test (Java 21)
  # ──────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          # Minimal JWT keys for tests (RSA 2048 generated at test startup via HybridRetrievalIntegrationTest static block)
          JWT_PRIVATE_KEY: ""
          JWT_PUBLIC_KEY: ""

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test/

  # ──────────────────────────────────────────────────────────────────────────
  # AI Worker — pytest (Python 3.11)
  # ──────────────────────────────────────────────────────────────────────────
  ai-worker-test:
    name: AI Worker Tests (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install test-only subset — skip torch/sentence-transformers (large, not needed for unit tests)
          pip install \
            pydantic==2.7.1 \
            pydantic-settings==2.2.1 \
            rank-bm25==0.2.2 \
            tiktoken==0.7.0 \
            beautifulsoup4==4.12.3 \
            lxml==5.2.1 \
            numpy==1.26.4 \
            pytest==8.2.0 \
            pytest-asyncio==0.23.6 \
            pytest-mock==3.14.0

      - name: Run unit tests (skip embedding — no torch)
        run: |
          python -m pytest tests/test_bm25_service.py \
                           tests/test_document_service.py \
                           tests/test_retrieval_service.py \
                           tests/test_ai_service.py \
                           -v --tb=short
        env:
          # Disable model loading — tests mock SentenceTransformer
          ANTHROPIC_API_KEY: "test-key"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-worker-test-report
          path: ai-worker/.pytest_cache/

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend — Vitest (Node 20)
  # ──────────────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────────────
  # Docker build (on push to master only — no push to registry)
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, ai-worker-test, frontend-test]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: devpulse/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ai-worker image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-worker
          file: ./ai-worker/Dockerfile
          push: false
          tags: devpulse/ai-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: devpulse/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
