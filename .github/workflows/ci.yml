name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend — Gradle test (Java 21)
  # ──────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests + Jacoco
        run: ./gradlew test jacocoTestReport --no-daemon
        env:
          # Minimal JWT keys for tests (RSA 2048 generated at test startup via HybridRetrievalIntegrationTest static block)
          JWT_PRIVATE_KEY: ""
          JWT_PUBLIC_KEY: ""

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test/

      - name: Upload Jacoco coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/build/reports/jacoco/test/html/

  # ──────────────────────────────────────────────────────────────────────────
  # AI Worker — pytest (Python 3.11)
  # ──────────────────────────────────────────────────────────────────────────
  ai-worker-test:
    name: AI Worker Tests (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install test-only subset — skip torch/sentence-transformers (large, not needed for unit tests)
          pip install \
            pydantic==2.7.1 \
            pydantic-settings==2.2.1 \
            anthropic==0.28.0 \
            asyncpg==0.29.0 \
            confluent-kafka==2.4.0 \
            rank-bm25==0.2.2 \
            tiktoken==0.7.0 \
            beautifulsoup4==4.12.3 \
            lxml==5.2.1 \
            numpy==1.26.4 \
            prometheus-client==0.20.0 \
            redis==5.0.4 \
            tenacity==8.3.0 \
            pytest==8.2.0 \
            pytest-asyncio==0.23.6 \
            pytest-mock==3.14.0 \
            pytest-cov==5.0.0

      - name: Run unit tests with coverage (skip embedding — no torch)
        run: |
          python -m pytest tests/test_bm25_service.py \
                           tests/test_document_service.py \
                           tests/test_retrieval_service.py \
                           tests/test_ai_service.py \
                           -v --tb=short \
                           --cov=app --cov-report=xml --cov-report=term-missing
        env:
          # Disable model loading — tests mock SentenceTransformer
          ANTHROPIC_API_KEY: "test-key"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-worker-coverage
          path: ai-worker/coverage.xml

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend — Vitest (Node 20)
  # ──────────────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npx next lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ──────────────────────────────────────────────────────────────────────────
  # Build & push multi-arch images to ghcr.io (master only, after all tests)
  # ──────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-test, ai-worker-test, frontend-test]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devpulse-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/devpulse-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ai-worker image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-worker
          file: ./ai-worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devpulse-ai-worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/devpulse-ai-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devpulse-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/devpulse-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # K8s rolling deploy with auto-rollback (master only, after images pushed)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: K8s Rolling Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Rolling deploy — backend
        id: deploy-backend
        run: |
          kubectl set image deployment/devpulse-backend \
            backend=ghcr.io/${{ github.repository_owner }}/devpulse-backend:${{ github.sha }} \
            -n devpulse
          kubectl rollout status deployment/devpulse-backend -n devpulse --timeout=5m

      - name: Rolling deploy — ai-worker
        id: deploy-ai-worker
        run: |
          kubectl set image deployment/devpulse-ai-worker \
            ai-worker=ghcr.io/${{ github.repository_owner }}/devpulse-ai-worker:${{ github.sha }} \
            -n devpulse
          kubectl rollout status deployment/devpulse-ai-worker -n devpulse --timeout=5m

      - name: Rolling deploy — frontend
        id: deploy-frontend
        run: |
          kubectl set image deployment/devpulse-frontend \
            frontend=ghcr.io/${{ github.repository_owner }}/devpulse-frontend:${{ github.sha }} \
            -n devpulse
          kubectl rollout status deployment/devpulse-frontend -n devpulse --timeout=5m

      - name: Auto-rollback on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back all deployments..."
          kubectl rollout undo deployment/devpulse-backend  -n devpulse || true
          kubectl rollout undo deployment/devpulse-ai-worker -n devpulse || true
          kubectl rollout undo deployment/devpulse-frontend -n devpulse || true
          echo "Rollback complete."
          exit 1
